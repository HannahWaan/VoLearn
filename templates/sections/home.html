<!-- ==================== HOME SECTION ==================== -->
<section id="home-section" class="section active">
    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon blue">
                <i class="fas fa-layer-group"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value" id="total-words">0</span>
                <span class="stat-label">Tổng từ vựng</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon green">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value" id="mastered-words">0</span>
                <span class="stat-label">Đã thuộc</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon orange">
                <i class="fas fa-fire"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value" id="current-streak">0</span>
                <span class="stat-label">Ngày streak</span>
            </div>
        </div>
    </div>

    <!-- Recent Words Card -->
    <div class="card">
        <div class="card-header">
            <h2><i class="fas fa-history"></i> Từ vựng gần đây</h2>
        </div>
        <div class="card-body">
            <div id="recent-words-list" class="recent-words-list">
                <p class="empty-message">Chưa có từ vựng nào. Hãy thêm từ mới!</p>
            </div>
        </div>
    </div>
</section>
