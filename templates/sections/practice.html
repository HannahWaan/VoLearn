<!-- ==================== PRACTICE SECTION ==================== -->
<section id="practice-section" class="section">
    <!-- Practice Modes Selection -->
    <div id="practice-modes" class="practice-modes">
        <!-- SRS Card -->
        <div class="srs-card">
            <div class="srs-icon">
                <i class="fas fa-brain"></i>
            </div>
            <div class="srs-info">
                <h3>Ôn tập ngắt quãng (SRS)</h3>
                <p>Hệ thống tự động nhắc lại các từ vựng bạn sắp quên. Học ít, nhớ lâu!</p>
                <div class="srs-count-wrapper">
                    <span class="srs-count-label">Từ cần ôn:</span>
                    <span id="srs-count" class="srs-count">0</span>
                </div>
            </div>
            <button id="btn-start-srs" class="btn-primary btn-srs-start">
                <i class="fas fa-play"></i> Bắt đầu ôn tập
            </button>
        </div>

        <div class="practice-divider">
            <span>Các chế độ luyện tập</span>
        </div>

        <!-- Practice Modes Grid -->
        <div class="practice-grid">
            <!-- Flashcard -->
            <div class="practice-mode-card" data-mode="flashcard">
                <div class="mode-icon flashcard-icon">
                    <i class="fas fa-clone"></i>
                </div>
                <h3>Flashcard</h3>
                <p>Lật thẻ để học từ vựng</p>
                <button class="btn-secondary btn-open-settings" data-mode="flashcard">
                    <i class="fas fa-play"></i> Bắt đầu
                </button>
            </div>
            
            <!-- Quiz -->
            <div class="practice-mode-card" data-mode="quiz">
                <div class="mode-icon quiz-icon">
                    <i class="fas fa-question-circle"></i>
                </div>
                <h3>Trắc nghiệm</h3>
                <p>Chọn đáp án đúng</p>
                <button class="btn-secondary btn-open-settings" data-mode="quiz">
                    <i class="fas fa-play"></i> Bắt đầu
                </button>
            </div>
            
            <!-- Dictation -->
            <div class="practice-mode-card" data-mode="dictation">
                <div class="mode-icon dictation-icon">
                    <i class="fas fa-headphones"></i>
                </div>
                <h3>Nghe - Viết</h3>
                <p>Nghe và viết lại từ</p>
                <button class="btn-secondary btn-open-settings" data-mode="dictation">
                    <i class="fas fa-play"></i> Bắt đầu
                </button>
            </div>
            
            <!-- Typing -->
            <div class="practice-mode-card" data-mode="typing">
                <div class="mode-icon typing-icon">
                    <i class="fas fa-keyboard"></i>
                </div>
                <h3>Gõ từ</h3>
                <p>Nhìn nghĩa, gõ từ tiếng Anh</p>
                <button class="btn-secondary btn-open-settings" data-mode="typing">
                    <i class="fas fa-play"></i> Bắt đầu
                </button>
            </div>
        </div>
    </div>

    <!-- Practice Area (hidden by default) -->
    <div id="practice-area" class="practice-area" style="display: none;">
        <div class="practice-header">
            <button class="btn-back" id="btn-practice-back">
                <i class="fas fa-arrow-left"></i> Quay lại
            </button>
            <div class="practice-progress">
                <div class="progress-bar">
                    <div id="practice-progress-bar" class="progress-fill" style="width: 0%;"></div>
                </div>
                <span id="practice-progress-text">0/0</span>
            </div>
        </div>
        <div id="practice-content" class="practice-content">
            <!-- Practice content will be dynamically loaded here -->
        </div>
    </div>
</section>
