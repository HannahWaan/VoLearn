<section id="notes-section" class="content-section">
  <!-- ===== HEADER ===== -->
  <div class="notes-header">
    <div class="notes-header-left">
      <h2 class="notes-title">Ghi chú</h2>
      <span class="notes-count" id="notes-count">0</span>
    </div>
    <div class="notes-header-right">
      <div class="notes-view-toggle">
        <button class="view-btn active" data-view="grid" title="Lưới"><i class="fas fa-th"></i></button>
        <button class="view-btn" data-view="list" title="Danh sách"><i class="fas fa-list"></i></button>
      </div>
      <div class="notes-search">
        <i class="fas fa-search"></i>
        <input type="text" id="notes-search-input" placeholder="Tìm ghi chú...">
      </div>
      <button class="create-note-btn" id="create-note-btn"><i class="fas fa-plus"></i> Tạo mới</button>
    </div>
  </div>

  <!-- ===== NOTES CONTAINER ===== -->
  <div class="notes-container" id="notes-container">
    <div class="notes-grid" id="notes-grid"></div>
  </div>
  <div class="notes-empty" id="notes-empty">
    <i class="fas fa-sticky-note"></i>
    <p>Chưa có ghi chú nào</p>
    <span>Nhấn "Tạo mới" để bắt đầu</span>
  </div>

  <!-- ===== NOTE EDITOR (full screen) ===== -->
  <div class="note-editor" id="note-editor" style="display:none;">
    <div class="note-editor-header">
      <button class="editor-back-btn" id="editor-back-btn"><i class="fas fa-arrow-left"></i></button>
      <div class="editor-actions">
        <div class="editor-color-picker">
          <input type="color" id="note-color-input" value="#1a1a2e" title="Màu nền">
        </div>
        <button class="editor-action-btn" id="editor-pin-btn" title="Ghim"><i class="fas fa-thumbtack"></i></button>
        <button class="editor-action-btn" id="editor-image-btn" title="Thêm ảnh"><i class="fas fa-image"></i></button>
        <button class="editor-action-btn delete" id="editor-delete-btn" title="Xóa"><i class="fas fa-trash"></i></button>
      </div>
    </div>

    <div class="note-editor-body">
      <input type="text" class="note-title-input" id="note-title-input" placeholder="Tiêu đề ghi chú...">

      <!-- TOOLBAR -->
      <div class="editor-toolbar" id="editor-toolbar">
        <button class="toolbar-btn" id="toolbar-undo" title="Hoàn tác"><i class="fas fa-undo"></i></button>
        <button class="toolbar-btn" id="toolbar-redo" title="Làm lại"><i class="fas fa-redo"></i></button>
        <span class="toolbar-sep"></span>

        <button class="toolbar-btn" id="toolbar-format-painter" title="Sao chép định dạng"><i class="fas fa-paint-roller"></i></button>
        <span class="toolbar-sep"></span>

        <button class="toolbar-btn" data-cmd="bold" title="Đậm"><i class="fas fa-bold"></i></button>
        <button class="toolbar-btn" data-cmd="italic" title="Nghiêng"><i class="fas fa-italic"></i></button>
        <button class="toolbar-btn" data-cmd="underline" title="Gạch chân"><i class="fas fa-underline"></i></button>
        <button class="toolbar-btn" data-cmd="strikeThrough" title="Gạch ngang"><i class="fas fa-strikethrough"></i></button>
        <span class="toolbar-sep"></span>

        <div class="toolbar-color-group">
          <button class="toolbar-btn" id="toolbar-font-color" title="Màu chữ"><i class="fas fa-font"></i><span class="color-indicator" id="font-color-indicator"></span></button>
          <input type="color" class="toolbar-color-input" id="font-color-picker" value="#ff0000">
        </div>

        <div class="toolbar-highlight-group">
          <button class="toolbar-btn" id="toolbar-highlight" title="Tô sáng"><i class="fas fa-highlighter"></i><span class="color-indicator" id="highlight-color-indicator"></span></button>
          <input type="color" class="toolbar-color-input" id="highlight-color-picker" value="#ffff00">
        </div>
        <span class="toolbar-sep"></span>

        <button class="toolbar-btn" data-cmd="justifyLeft" title="Căn trái"><i class="fas fa-align-left"></i></button>
        <button class="toolbar-btn" data-cmd="justifyCenter" title="Căn giữa"><i class="fas fa-align-center"></i></button>
        <button class="toolbar-btn" data-cmd="justifyRight" title="Căn phải"><i class="fas fa-align-right"></i></button>
        <button class="toolbar-btn" data-cmd="justifyFull" title="Căn đều"><i class="fas fa-align-justify"></i></button>
        <span class="toolbar-sep"></span>

        <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Danh sách"><i class="fas fa-list-ul"></i></button>
        <button class="toolbar-btn" data-cmd="insertOrderedList" title="Danh sách số"><i class="fas fa-list-ol"></i></button>
        <button class="toolbar-btn" id="toolbar-todo" title="Danh sách việc"><i class="fas fa-tasks"></i></button>
        <span class="toolbar-sep"></span>

        <button class="toolbar-btn" data-cmd="indent" title="Thụt vào"><i class="fas fa-indent"></i></button>
        <button class="toolbar-btn" data-cmd="outdent" title="Thụt ra"><i class="fas fa-outdent"></i></button>
        <span class="toolbar-sep"></span>

        <button class="toolbar-btn toolbar-heading" data-heading="H1" title="Tiêu đề 1">H1</button>
        <button class="toolbar-btn toolbar-heading" data-heading="H2" title="Tiêu đề 2">H2</button>
        <button class="toolbar-btn toolbar-heading" data-heading="H3" title="Tiêu đề 3">H3</button>
        <button class="toolbar-btn toolbar-heading" data-heading="P" title="Văn bản thường">P</button>
        <span class="toolbar-sep"></span>

        <button class="toolbar-btn" data-cmd="formatBlock" data-value="BLOCKQUOTE" title="Trích dẫn"><i class="fas fa-quote-right"></i></button>
        <button class="toolbar-btn" id="toolbar-table" title="Chèn bảng"><i class="fas fa-table"></i></button>
      </div>

      <div class="note-content-editor" id="note-content-editor" contenteditable="true" data-placeholder="Nội dung ghi chú..."></div>
      <div class="note-images" id="note-images"></div>
    </div>

    <div class="save-status" id="save-status"><i class="fas fa-check"></i> Đã lưu</div>
  </div>

  <input type="file" id="note-image-input" accept="image/*" multiple style="display:none;">

  <!-- TABLE CREATOR MODAL -->
  <div class="table-creator-modal" id="table-creator-modal" style="display:none;">
    <div class="table-creator-content">
      <h3>Chèn bảng</h3>
      <div class="table-creator-inputs">
        <label>Số hàng: <input type="number" id="table-rows-input" value="3" min="1" max="20"></label>
        <label>Số cột: <input type="number" id="table-cols-input" value="3" min="1" max="10"></label>
      </div>
      <div class="table-creator-preview" id="table-creator-preview"></div>
      <div class="table-creator-actions">
        <button class="table-cancel-btn" id="table-cancel-btn">Hủy</button>
        <button class="table-confirm-btn" id="table-confirm-btn">Chèn</button>
      </div>
    </div>
  </div>

  <!-- TABLE CONTEXT MENU -->
  <div class="table-context-menu" id="table-context-menu" style="display:none;">
    <button data-action="insertRowAbove"><i class="fas fa-arrow-up"></i> Thêm hàng trên</button>
    <button data-action="insertRowBelow"><i class="fas fa-arrow-down"></i> Thêm hàng dưới</button>
    <button data-action="insertColLeft"><i class="fas fa-arrow-left"></i> Thêm cột trái</button>
    <button data-action="insertColRight"><i class="fas fa-arrow-right"></i> Thêm cột phải</button>
    <hr>
    <button data-action="deleteRow"><i class="fas fa-minus"></i> Xóa hàng</button>
    <button data-action="deleteCol"><i class="fas fa-minus"></i> Xóa cột</button>
    <button data-action="clearCell"><i class="fas fa-eraser"></i> Xóa nội dung ô</button>
    <hr>
    <button data-action="deleteTable"><i class="fas fa-trash"></i> Xóa bảng</button>
  </div>

  <!-- LIGHTBOX -->
  <div class="note-lightbox" id="note-lightbox" style="display:none;">
    <div class="lightbox-controls">
      <button class="lightbox-btn" id="lightbox-zoom-in"><i class="fas fa-search-plus"></i></button>
      <button class="lightbox-btn" id="lightbox-zoom-out"><i class="fas fa-search-minus"></i></button>
      <button class="lightbox-btn" id="lightbox-reset"><i class="fas fa-expand"></i></button>
      <button class="lightbox-btn delete" id="lightbox-delete"><i class="fas fa-trash"></i></button>
      <button class="lightbox-btn" id="lightbox-close"><i class="fas fa-times"></i></button>
    </div>
    <img class="lightbox-image" id="lightbox-image" src="" alt="Preview">
  </div>
</section>
