<!-- ==================== NOTES SECTION ==================== -->
<section id="notes-section" class="section">

    <!-- Header -->
    <div class="notes-header">
        <div class="notes-header-left">
            <h2 class="notes-title"><i class="fas fa-sticky-note"></i> Ghi chú</h2>
            <span class="notes-count" id="notes-count">0 ghi chú</span>
        </div>
        <div class="notes-header-right">
            <div class="notes-search">
                <i class="fas fa-search"></i>
                <input type="text" id="notes-search-input" placeholder="Tìm ghi chú...">
            </div>
            <button class="btn-create-note" id="btn-create-note">
                <i class="fas fa-plus"></i>
                <span>Tạo mới</span>
            </button>
        </div>
    </div>

    <!-- View Toggle -->
    <div class="notes-view-toggle">
        <button class="view-btn active" data-view="grid" title="Dạng lưới">
            <i class="fas fa-th"></i>
        </button>
        <button class="view-btn" data-view="list" title="Dạng danh sách">
            <i class="fas fa-list"></i>
        </button>
    </div>

    <!-- Notes Grid -->
    <div id="notes-container" class="notes-grid"></div>

    <!-- Empty State -->
    <div id="notes-empty" class="notes-empty" style="display:none;">
        <i class="fas fa-pen-fancy"></i>
        <h3>Chưa có ghi chú nào</h3>
        <p>Nhấn "Tạo mới" để bắt đầu ghi chú</p>
    </div>

    <!-- ===== NOTE EDITOR (full screen overlay) ===== -->
    <div id="note-editor" class="note-editor" style="display:none;">
        <div class="note-editor-header">
            <button class="btn-editor-back" id="btn-editor-back">
                <i class="fas fa-arrow-left"></i>
                <span>Quay lại</span>
            </button>
            <div class="note-editor-actions">
                <input type="color" id="note-color-picker" class="note-color-picker" value="#ffffff" title="Màu ghi chú">
                <button class="btn-editor-action" id="btn-note-pin" title="Ghim">
                    <i class="fas fa-thumbtack"></i>
                </button>
                <button class="btn-editor-action" id="btn-note-image" title="Thêm hình ảnh">
                    <i class="fas fa-image"></i>
                </button>
                <button class="btn-editor-action danger" id="btn-note-delete" title="Xóa ghi chú">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>

        <div class="note-editor-body">
            <input type="text" id="note-title-input" class="note-title-input" placeholder="Tiêu đề...">

            <!-- Toolbar -->
            <div class="note-toolbar">
                <!-- Undo / Redo -->
                <button class="toolbar-btn" id="btn-undo" title="Hoàn tác (Ctrl+Z)"><i class="fas fa-undo"></i></button>
                <button class="toolbar-btn" id="btn-redo" title="Làm lại (Ctrl+Y)"><i class="fas fa-redo"></i></button>
                <span class="toolbar-divider"></span>

                <!-- Text format -->
                <button class="toolbar-btn" data-cmd="bold" title="Đậm"><i class="fas fa-bold"></i></button>
                <button class="toolbar-btn" data-cmd="italic" title="Nghiêng"><i class="fas fa-italic"></i></button>
                <button class="toolbar-btn" data-cmd="underline" title="Gạch chân"><i class="fas fa-underline"></i></button>
                <button class="toolbar-btn" data-cmd="strikeThrough" title="Gạch ngang"><i class="fas fa-strikethrough"></i></button>
                <span class="toolbar-divider"></span>

                <!-- Highlight with color picker -->
                <div class="toolbar-highlight-group">
                    <button class="toolbar-btn" id="btn-highlight" title="Highlight"><i class="fas fa-highlighter"></i></button>
                    <input type="color" id="highlight-color-picker" class="highlight-color-input" value="#fff176" title="Chọn màu highlight">
                </div>
                <button class="toolbar-btn" id="btn-remove-highlight" title="Xóa highlight"><i class="fas fa-eraser"></i></button>
                <span class="toolbar-divider"></span>

                <!-- Lists -->
                <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Danh sách"><i class="fas fa-list-ul"></i></button>
                <button class="toolbar-btn" data-cmd="insertOrderedList" title="Danh sách số"><i class="fas fa-list-ol"></i></button>
                <button class="toolbar-btn" id="btn-todo-list" title="To-do list"><i class="fas fa-tasks"></i></button>
                <span class="toolbar-divider"></span>

                <!-- Indent -->
                <button class="toolbar-btn" data-cmd="indent" title="Thụt đầu dòng"><i class="fas fa-indent"></i></button>
                <button class="toolbar-btn" data-cmd="outdent" title="Bớt thụt"><i class="fas fa-outdent"></i></button>
                <span class="toolbar-divider"></span>

                <!-- Headings H1, H2, H3 -->
                <button class="toolbar-btn toolbar-heading" data-cmd="formatBlock" data-value="H1" title="Tiêu đề 1">H1</button>
                <button class="toolbar-btn toolbar-heading" data-cmd="formatBlock" data-value="H2" title="Tiêu đề 2">H2</button>
                <button class="toolbar-btn toolbar-heading" data-cmd="formatBlock" data-value="H3" title="Tiêu đề 3">H3</button>
                <button class="toolbar-btn" data-cmd="formatBlock" data-value="BLOCKQUOTE" title="Trích dẫn"><i class="fas fa-quote-right"></i></button>
                <button class="toolbar-btn" data-cmd="formatBlock" data-value="P" title="Đoạn văn thường"><i class="fas fa-paragraph"></i></button>
                <span class="toolbar-divider"></span>

                <!-- Table -->
                <button class="toolbar-btn" id="btn-insert-table" title="Chèn bảng"><i class="fas fa-table"></i></button>
            </div>

            <!-- Content editable area -->
            <div id="note-content-editor" class="note-content-editor" contenteditable="true" placeholder="Bắt đầu viết ghi chú..."></div>

            <!-- Images gallery -->
            <div id="note-images" class="note-images"></div>
        </div>

        <!-- Hidden file input -->
        <input type="file" id="note-image-input" accept="image/*" multiple style="display:none;">

        <!-- Auto-save indicator -->
        <div id="note-save-status" class="note-save-status">
            <i class="fas fa-check"></i> Đã lưu
        </div>
    </div>

    <!-- ===== TABLE CREATOR MODAL ===== -->
    <div id="table-creator-modal" class="note-modal-overlay" style="display:none;">
        <div class="note-modal">
            <div class="note-modal-header">
                <h4><i class="fas fa-table"></i> Tạo bảng</h4>
                <button class="note-modal-close" id="btn-close-table-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="note-modal-body">
                <div class="table-size-inputs">
                    <div class="table-size-group">
                        <label>Số dòng</label>
                        <input type="number" id="table-rows-input" value="3" min="1" max="20">
                    </div>
                    <span class="table-size-x">×</span>
                    <div class="table-size-group">
                        <label>Số cột</label>
                        <input type="number" id="table-cols-input" value="3" min="1" max="10">
                    </div>
                </div>
                <div class="table-preview-label">Xem trước:</div>
                <div id="table-preview" class="table-preview"></div>
            </div>
            <div class="note-modal-footer">
                <button class="btn-secondary" id="btn-cancel-table">Hủy</button>
                <button class="btn-primary" id="btn-confirm-table"><i class="fas fa-check"></i> Chèn bảng</button>
            </div>
        </div>
    </div>

    <!-- ===== IMAGE LIGHTBOX ===== -->
    <div id="note-lightbox" class="note-lightbox" style="display:none;">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div class="lightbox-controls">
                <button class="lightbox-btn" id="lightbox-zoom-in" title="Phóng to"><i class="fas fa-search-plus"></i></button>
                <button class="lightbox-btn" id="lightbox-zoom-out" title="Thu nhỏ"><i class="fas fa-search-minus"></i></button>
                <button class="lightbox-btn" id="lightbox-reset" title="Kích thước gốc"><i class="fas fa-expand"></i></button>
                <button class="lightbox-btn danger" id="lightbox-delete" title="Xóa ảnh"><i class="fas fa-trash"></i></button>
                <button class="lightbox-btn" id="lightbox-close" title="Đóng"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

</section>
