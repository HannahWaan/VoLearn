<!-- Dictation Settings Modal -->
<div id="dictation-settings-modal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3><i class="fas fa-headphones" style="color: var(--info-color);"></i> Nghe - Viết</h3>
            <button class="modal-close" onclick="closeDictationSettings()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body flashcard-settings-body">
            <!-- Tabs -->
            <div class="settings-tabs">
                <button class="settings-tab active" onclick="switchDictationTab('target', this)">Mục tiêu</button>
                <button class="settings-tab" onclick="switchDictationTab('other', this)">Cài đặt</button>
            </div>

            <!-- Tab 1: Mục tiêu -->
            <div id="dictation-tab-target" class="settings-tab-content active">
                <div class="setting-section">
                    <div class="setting-row">
                        <span class="setting-label">Số từ cần nghe</span>
                        <div class="setting-value">
                            <button class="btn-circle" onclick="adjustDictationLimit(-5)"><i class="fas fa-minus"></i></button>
                            <span id="dictation-limit-value">Không giới hạn</span>
                            <button class="btn-circle" onclick="adjustDictationLimit(5)"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                    <input type="range" id="dictation-limit-slider" min="0" max="100" value="0" 
                           oninput="updateDictationLimit(this.value)" class="full-slider">
                </div>

                <div class="setting-section">
                    <div class="section-header">
                        <h4><i class="fas fa-crosshairs"></i> Phạm Vi</h4>
                    </div>
                    <div class="scope-option" onclick="openDictationScopeSelector('set')">
                        <i class="fas fa-layer-group"></i>
                        <span id="dictation-selected-set-name">Tất Cả Từ Vựng</span>
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-bookmark"></i> Bao gồm</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="dictation-include-learning" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Chưa thuộc</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="dictation-include-mastered" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Đã thuộc</span>
                    </label>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-sort"></i> Sắp Xếp</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="dictation-sort" value="random" checked>
                            <span class="radio-mark"></span>
                            <span>Ngẫu nhiên</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="dictation-sort" value="newest">
                            <span class="radio-mark"></span>
                            <span>Mới nhất trước</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Tab 2: Cài đặt -->
            <div id="dictation-tab-other" class="settings-tab-content">
                <div class="setting-section">
                    <h4><i class="fas fa-globe"></i> Giọng đọc</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="dictation-voice" value="en-US" checked>
                            <span class="radio-mark"></span>
                            <span>🇺🇸 Giọng Mỹ (US)</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="dictation-voice" value="en-GB">
                            <span class="radio-mark"></span>
                            <span>🇬🇧 Giọng Anh (UK)</span>
                        </label>
                    </div>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-redo"></i> Số lần được nghe lại</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="dictation-replay" value="3" checked>
                            <span class="radio-mark"></span>
                            <span>3 lần</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="dictation-replay" value="5">
                            <span class="radio-mark"></span>
                            <span>5 lần</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="dictation-replay" value="0">
                            <span class="radio-mark"></span>
                            <span>Không giới hạn</span>
                        </label>
                    </div>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-lightbulb"></i> Gợi ý</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="dictation-show-hint">
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Hiện gợi ý nghĩa tiếng Việt</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="dictation-show-length" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Hiện số ký tự của từ</span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="btn-start-practice" onclick="startDictationWithSettings()">
                <i class="fas fa-play"></i> Bắt đầu luyện nghe
            </button>
        </div>
    </div>
</div>
