<!-- Typing Settings Modal -->
<div id="typing-settings-modal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3><i class="fas fa-keyboard" style="color: var(--warning-color);"></i> Gõ từ</h3>
            <button class="modal-close" onclick="closeTypingSettings()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body flashcard-settings-body">
            <!-- Tabs -->
            <div class="settings-tabs">
                <button class="settings-tab active" onclick="switchTypingTab('target', this)">Mục tiêu</button>
                <button class="settings-tab" onclick="switchTypingTab('other', this)">Cài đặt</button>
            </div>

            <!-- Tab 1: Mục tiêu -->
            <div id="typing-tab-target" class="settings-tab-content active">
                <div class="setting-section">
                    <div class="setting-row">
                        <span class="setting-label">Số từ cần gõ</span>
                        <div class="setting-value">
                            <button class="btn-circle" onclick="adjustTypingLimit(-5)"><i class="fas fa-minus"></i></button>
                            <span id="typing-limit-value">Không giới hạn</span>
                            <button class="btn-circle" onclick="adjustTypingLimit(5)"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                    <input type="range" id="typing-limit-slider" min="0" max="100" value="0" 
                           oninput="updateTypingLimit(this.value)" class="full-slider">
                </div>

                <div class="setting-section">
                    <div class="section-header">
                        <h4><i class="fas fa-crosshairs"></i> Phạm Vi</h4>
                    </div>
                    <div class="scope-option" onclick="openTypingScopeSelector('set')">
                        <i class="fas fa-layer-group"></i>
                        <span id="typing-selected-set-name">Tất Cả Từ Vựng</span>
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-bookmark"></i> Bao gồm</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-include-learning" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Chưa thuộc</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-include-mastered" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Đã thuộc</span>
                    </label>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-sort"></i> Sắp Xếp</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="typing-sort" value="random" checked>
                            <span class="radio-mark"></span>
                            <span>Ngẫu nhiên</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="typing-sort" value="newest">
                            <span class="radio-mark"></span>
                            <span>Mới nhất trước</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Tab 2: Cài đặt -->
            <div id="typing-tab-other" class="settings-tab-content">
                <div class="setting-section">
                    <h4><i class="fas fa-exchange-alt"></i> Dạng câu hỏi</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="typing-type" value="vi-en" checked>
                            <span class="radio-mark"></span>
                            <span>Nghĩa Việt → Gõ từ tiếng Anh</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="typing-type" value="en-vi">
                            <span class="radio-mark"></span>
                            <span>Định nghĩa Anh → Gõ từ tiếng Anh</span>
                        </label>
                    </div>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-lightbulb"></i> Gợi ý</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-show-hint" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Hiện chữ cái đầu tiên</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-show-length" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Hiện số ký tự của từ</span>
                    </label>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-check-double"></i> Kiểm tra</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-case-sensitive">
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Phân biệt chữ hoa/thường</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-auto-check" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Tự động kiểm tra khi gõ xong</span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="btn-start-practice" onclick="startTypingWithSettings()">
                <i class="fas fa-play"></i> Bắt đầu luyện gõ
            </button>
        </div>
    </div>
</div>
