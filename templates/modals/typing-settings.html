<!-- ==================== TYPING SETTINGS MODAL ==================== -->
<div id="typing-settings-modal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3><i class="fas fa-keyboard" style="color: var(--accent-color);"></i> Cài đặt Gõ từ</h3>
            <button class="modal-close" data-modal="typing-settings-modal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <!-- Tabs -->
            <div class="settings-tabs">
                <button class="settings-tab active" data-tab="typing-target">Mục tiêu</button>
                <button class="settings-tab" data-tab="typing-options">Tùy chọn</button>
            </div>

            <!-- Tab: Mục tiêu -->
            <div id="typing-tab-target" class="settings-tab-content active">
                <!-- Giới hạn -->
                <div class="setting-section">
                    <div class="setting-row">
                        <span class="setting-label">Số từ</span>
                        <div class="setting-value">
                            <button class="btn-circle" id="typing-limit-minus"><i class="fas fa-minus"></i></button>
                            <span id="typing-limit-value">Không giới hạn</span>
                            <button class="btn-circle" id="typing-limit-plus"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                    <input type="range" id="typing-limit-slider" min="0" max="100" value="0" class="full-slider">
                </div>

                <!-- Phạm vi -->
                <div class="setting-section">
                    <div class="section-header">
                        <h4><i class="fas fa-crosshairs"></i> Phạm vi</h4>
                    </div>
                    
                    <div class="scope-option" id="typing-scope-set">
                        <i class="fas fa-layer-group"></i>
                        <span id="typing-selected-set">Tất cả từ vựng</span>
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>

                <!-- Đánh dấu -->
                <div class="setting-section">
                    <h4><i class="fas fa-bookmark"></i> Đánh dấu từ</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-include-unmarked" checked>
                        <span class="checkbox-label">Chưa đánh dấu</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-include-mastered" checked>
                        <span class="checkbox-label">Đã thuộc</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-include-learning" checked>
                        <span class="checkbox-label">Chưa thuộc</span>
                    </label>
                </div>

                <!-- Sắp xếp -->
                <div class="setting-section">
                    <h4><i class="fas fa-sort"></i> Sắp xếp</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="typing-sort" value="random" checked>
                            <span>Ngẫu nhiên</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="typing-sort" value="newest">
                            <span>Mới nhất</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="typing-sort" value="az">
                            <span>A-Z</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Tab: Tùy chọn -->
            <div id="typing-tab-options" class="settings-tab-content">
                <!-- Hiển thị -->
                <div class="setting-section">
                    <h4><i class="fas fa-eye"></i> Hiển thị câu hỏi</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-show-defvi" checked>
                        <span class="checkbox-label">Nghĩa tiếng Việt</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-show-defen">
                        <span class="checkbox-label">Định nghĩa tiếng Anh</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-show-example">
                        <span class="checkbox-label">Ví dụ (ẩn từ cần điền)</span>
                    </label>
                </div>

                <!-- Tùy chọn kiểm tra -->
                <div class="setting-section">
                    <h4><i class="fas fa-check-double"></i> Kiểm tra</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-case-sensitive">
                        <span class="checkbox-label">Phân biệt hoa/thường</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-instant-check" checked>
                        <span class="checkbox-label">Kiểm tra ngay khi nhập</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="typing-show-hint">
                        <span class="checkbox-label">Cho phép xem gợi ý</span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="btn-primary" id="btn-start-typing">
                <i class="fas fa-play"></i> Bắt đầu
            </button>
        </div>
    </div>
</div>
