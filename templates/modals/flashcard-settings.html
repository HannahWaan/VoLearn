<!-- FLASHCARD SETTINGS MODAL -->
<div class="modal-overlay" id="flashcard-settings-modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h2><i class="fas fa-clone"></i> Cài đặt Flashcard</h2>
            <button class="btn-close" onclick="closeFlashcardSettings()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="modal-body practice-settings-body">
            <!-- Tabs -->
            <div class="settings-tabs">
                <button class="settings-tab active" data-tab="fc-target">
                    <i class="fas fa-bullseye"></i> Mục tiêu
                </button>
                <button class="settings-tab" data-tab="fc-display">
                    <i class="fas fa-eye"></i> Hiển thị
                </button>
            </div>

            <!-- Tab Content: Mục tiêu -->
            <div class="settings-tab-content active" id="fc-target">
                <div class="setting-group">
                    <label class="setting-label">Số lượng thẻ</label>
                    <div class="limit-control">
                        <button class="btn-limit" onclick="adjustFcLimit(-5)">-5</button>
                        <span class="limit-value" id="fc-limit-value">20</span>
                        <button class="btn-limit" onclick="adjustFcLimit(5)">+5</button>
                    </div>
                    <input type="range" id="fc-limit-slider" min="5" max="100" value="20" step="5" 
                           oninput="updateFcLimit(this.value)">
                </div>

                <div class="setting-group">
                    <label class="setting-label">Bộ từ vựng</label>
                    <select id="fc-set-select" class="setting-select-full">
                        <option value="all">Tất cả từ vựng</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label class="setting-label">Bao gồm</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="fc-include-learning" checked>
                            <span>Đang học</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="fc-include-mastered">
                            <span>Đã thuộc</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="fc-include-bookmarked">
                            <span>Đã đánh dấu</span>
                        </label>
                    </div>
                </div>

                <div class="setting-group">
                    <label class="setting-label">Thứ tự</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="fc-order" value="random" checked>
                            <span>Ngẫu nhiên</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="fc-order" value="newest">
                            <span>Mới nhất trước</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="fc-order" value="oldest">
                            <span>Cũ nhất trước</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Tab Content: Hiển thị -->
            <div class="settings-tab-content" id="fc-display">
                <div class="display-sides">
                    <div class="display-side">
                        <h4><i class="fas fa-square"></i> Mặt trước (Front)</h4>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" id="fc-front-word" checked disabled>
                                <span>Từ vựng</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="fc-front-phonetic" checked>
                                <span>Phiên âm</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="fc-front-pos">
                                <span>Loại từ</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="fc-front-example">
                                <span>Ví dụ</span>
                            </label>
                        </div>
                    </div>
                    <div class="display-side">
                        <h4><i class="fas fa-square"></i> Mặt sau (Back)</h4>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" id="fc-back-vi" checked>
                                <span>Nghĩa tiếng Việt</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="fc-back-en" checked>
                                <span>Định nghĩa tiếng Anh</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="fc-back-example" checked>
                                <span>Ví dụ</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="fc-back-synonym">
                                <span>Từ đồng nghĩa</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <div class="word-count-badge">
                <i class="fas fa-layer-group"></i>
                <span id="fc-word-count">0</span> từ phù hợp
            </div>
            <button class="btn-primary btn-start" onclick="startFlashcard()">
                <i class="fas fa-play"></i> Bắt đầu học
            </button>
        </div>
    </div>
</div>
