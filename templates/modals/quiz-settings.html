<!-- Quiz Settings Modal -->
<div id="quiz-settings-modal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3><i class="fas fa-question-circle" style="color: var(--success-color);"></i> Trắc nghiệm</h3>
            <button class="modal-close" onclick="closeQuizSettings()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body flashcard-settings-body">
            <!-- Tabs -->
            <div class="settings-tabs">
                <button class="settings-tab active" onclick="switchQuizTab('target', this)">Mục tiêu</button>
                <button class="settings-tab" onclick="switchQuizTab('view', this)">Xem</button>
                <button class="settings-tab" onclick="switchQuizTab('other', this)">Khác</button>
            </div>

            <!-- Tab 1: Mục tiêu -->
            <div id="quiz-tab-target" class="settings-tab-content active">
                <div class="setting-section">
                    <div class="setting-row">
                        <span class="setting-label">Giới hạn số câu hỏi</span>
                        <div class="setting-value">
                            <button class="btn-circle" onclick="adjustQuizLimit(-5)"><i class="fas fa-minus"></i></button>
                            <span id="quiz-limit-value">Không giới hạn</span>
                            <button class="btn-circle" onclick="adjustQuizLimit(5)"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                    <input type="range" id="quiz-limit-slider" min="0" max="100" value="0" 
                           oninput="updateQuizLimit(this.value)" class="full-slider">
                </div>

                <div class="setting-section">
                    <div class="section-header">
                        <h4><i class="fas fa-crosshairs"></i> Phạm Vi Kiểm Tra</h4>
                    </div>
                    <div class="scope-option" onclick="openQuizScopeSelector('set')">
                        <i class="fas fa-layer-group"></i>
                        <span id="quiz-selected-set-name">Tất Cả Từ Vựng</span>
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-bookmark"></i> Bao gồm</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="quiz-include-learning" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Chưa thuộc (<span id="quiz-count-learning">0</span>)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="quiz-include-mastered" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Đã thuộc (<span id="quiz-count-mastered">0</span>)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="quiz-include-bookmarked" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Đã đánh dấu sao (<span id="quiz-count-bookmarked">0</span>)</span>
                    </label>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-sort"></i> Sắp Xếp</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="quiz-sort" value="random" checked>
                            <span class="radio-mark"></span>
                            <span>Ngẫu nhiên</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-sort" value="newest">
                            <span class="radio-mark"></span>
                            <span>Mới nhất trước</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-sort" value="oldest">
                            <span class="radio-mark"></span>
                            <span>Cũ nhất trước</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Tab 2: Xem -->
            <div id="quiz-tab-view" class="settings-tab-content">
                <div class="setting-section">
                    <h4><i class="fas fa-exchange-alt"></i> Dạng câu hỏi</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="quiz-type" value="en-vi" checked>
                            <span class="radio-mark"></span>
                            <span>Tiếng Anh → Tiếng Việt</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-type" value="vi-en">
                            <span class="radio-mark"></span>
                            <span>Tiếng Việt → Tiếng Anh</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-type" value="mixed">
                            <span class="radio-mark"></span>
                            <span>Trộn lẫn cả hai</span>
                        </label>
                    </div>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-list-ol"></i> Số đáp án</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="quiz-options" value="3">
                            <span class="radio-mark"></span>
                            <span>3 đáp án</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-options" value="4" checked>
                            <span class="radio-mark"></span>
                            <span>4 đáp án</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-options" value="5">
                            <span class="radio-mark"></span>
                            <span>5 đáp án</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Tab 3: Khác -->
            <div id="quiz-tab-other" class="settings-tab-content">
                <div class="setting-section">
                    <h4><i class="fas fa-clock"></i> Giới hạn thời gian</h4>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="quiz-time" value="0" checked>
                            <span class="radio-mark"></span>
                            <span>Không giới hạn</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-time" value="10">
                            <span class="radio-mark"></span>
                            <span>10 giây/câu</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-time" value="15">
                            <span class="radio-mark"></span>
                            <span>15 giây/câu</span>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="quiz-time" value="30">
                            <span class="radio-mark"></span>
                            <span>30 giây/câu</span>
                        </label>
                    </div>
                </div>

                <div class="setting-section">
                    <h4><i class="fas fa-volume-up"></i> Âm thanh</h4>
                    <label class="checkbox-item">
                        <input type="checkbox" id="quiz-sound-correct" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Phát âm khi đúng</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="quiz-sound-wrong" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Phát âm khi sai</span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="btn-start-practice" onclick="startQuizWithSettings()">
                <i class="fas fa-play"></i> Bắt đầu làm bài
            </button>
        </div>
    </div>
</div>
